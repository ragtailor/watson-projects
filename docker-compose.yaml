services:
  # n8n 워크플로우 자동화
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # FastAPI 백엔드 서비스
  backend:
    build:
      context: ./tailor
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./fastapi/.env
    volumes:
      - ./fastapi:/fastapi
    depends_on:
      - pgvector
      - redis
      - neo4j

  # Next.js 프론트엔드 서비스
  frontend:
    build:
      context: ./taylor
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./taylor/.env.local
    depends_on:
      - backend

  # PostgreSQL + pgvector (관계형 DB + 벡터 검색)
  pgvector:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=ragtailor
    volumes:
      - pgvector_data:/var/lib/postgresql/data

  # Redis (캐시 / 세션)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Graph DB
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data

volumes:
  n8n_data:
  pgvector_data:
  redis_data:
  neo4j_data:
