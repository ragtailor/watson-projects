services:
  # n8n 워크플로우 자동화
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # FastAPI 백엔드 서비스 (DB/Redis는 dreamscape의 limbo/totem 사용, 로컬 pgvector/redis 제거)
  api:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8000"
    env_file:
      # .env: 기존 백엔드 설정(DATABASE_URL/REDIS_URL 등) 유지
      # .env.backend: JWT_PUBLIC_KEY(검증 전용). 개인키는 절대 넣지 않는다.
      - .env
      - .env.backend
    volumes:
      - ./fastapi:/fastapi
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - neo4j
    networks:
      - default
      - dreamscape

  # 인증 게이트웨이 (auth.ragtailor.com) — 토큰 발급 전용. 개인키는 여기에만.
  auth:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    command: uvicorn auth_main:app --host 0.0.0.0 --port 9000
    restart: unless-stopped
    env_file:
      - .env.auth        # JWT_PRIVATE_KEY, OAuth client secrets
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dreamscape

  # Graph DB
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data

networks:
  dreamscape:
    external: true

volumes:
  n8n_data:
  neo4j_data:
